server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. CSP is injected by SvelteKit as a <meta> tag (kit.csp
    # mode: 'hash'), so we don't duplicate it here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Hashed build chunks — safe to cache forever (new filenames on every deploy).
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Self-hosted fonts — immutable, cache aggressively.
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Service worker and manifest must revalidate every time so clients pick up
    # new app shells promptly.
    location = /service-worker.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for any route that doesn't match a file.
    # SvelteKit's client router picks up from there and validates the slug.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
