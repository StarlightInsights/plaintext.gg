<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline | plaintext.gg</title>
		<meta
			name="description"
			content="plaintext.gg is offline. Reconnect to load the latest editor."
		/>
		<style>
			:root {
				color-scheme: light dark;
				font-family:
					ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono",
					monospace;
				background: #fffdf7;
				color: #38342e;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					background: #38342e;
					color: #f1eee7;
				}
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
			}

			main {
				max-width: 36rem;
				line-height: 1.6;
			}

			h1 {
				margin: 0 0 0.75rem;
				font-size: 1rem;
				font-weight: 600;
			}

			p {
				margin: 0 0 0.75rem;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>offline</h1>
			<p>plaintext.gg could not fetch a fresh document.</p>
			<p>Reconnect to the network to load the latest editor and your locally stored text.</p>
			<p>If you already had the editor open in another tab, that tab may still continue working.</p>
		</main>
	</body>
</html>
