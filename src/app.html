<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" sizes="any" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" sizes="180x180" />
    <meta name="theme-color" content="#fffdf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#38342e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fffdf7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <!-- These styles intentionally duplicate app.css to prevent a flash of unstyled content (FOUC) before CSS loads. -->
    <style>
      html {
        background-color: #fffdf7;
        color-scheme: light;
      }

      html[data-theme="dark"] {
        background-color: #38342e;
        color-scheme: dark;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: transparent;
      }
    </style>
    <script>
      (() => {
        let theme = 'light';

        try {
          theme = localStorage.getItem('plaintext:theme') === 'dark' ? 'dark' : 'light';
        } catch {
          theme = 'light';
        }

        const themeColor = theme === 'dark' ? '#38342e' : '#fffdf7';
        const root = document.documentElement;

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.style.backgroundColor = themeColor;

        document.querySelectorAll('meta[name="theme-color"]').forEach((element) => {
          if (element instanceof HTMLMetaElement) {
            element.content = themeColor;
          }
        });
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
