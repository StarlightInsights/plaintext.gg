name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The action reads the pnpm version from `packageManager` in package.json.
      # Specifying `version:` here conflicts with that (action-setup@v6).
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      # E2E tests run against the actual production Docker image so we exercise
      # the real nginx config + static-file serving + SPA fallback.
      - name: Build Docker image
        run: docker build -t plaintext-gg .

      - name: Start container
        run: docker run -d --rm -p 3999:80 --name plaintext-gg plaintext-gg

      - name: Wait for container to be ready
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3999 > /dev/null; do sleep 1; done' \
            || { echo "Container failed to become ready"; docker logs plaintext-gg; exit 1; }

      - name: E2E tests
        env:
          # Opts the `tests/e2e/nginx.spec.ts` suite in — those tests assert
          # nginx-specific behavior (security headers, cache-control, SPA
          # fallback status codes) that vite preview doesn't mirror.
          TEST_DOCKER_HOSTING: '1'
        run: pnpm run test:e2e

      - name: Dump container logs on failure
        if: failure()
        run: docker logs plaintext-gg

      - name: Stop container
        if: always()
        run: docker stop plaintext-gg || true
